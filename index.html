<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frawn Play Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --play-bg: #1f1f1f;
            --play-card: #2d2d2d;
            --play-text: #e3e3e3;
            --play-muted: #8e918f;
            --play-green: #00a173;
            --play-green-hover: #00b884;
            --play-border: #3c4043;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', sans-serif;
        }

        body {
            background-color: var(--play-bg);
            color: var(--play-text);
            padding-bottom: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        /* En Üst Ana Logolar */
        .header-banner {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 20px;
            background-color: #181818;
            border-bottom: 1px solid var(--play-border);
            flex-wrap: wrap;
        }

        .header-banner img {
            height: 90px;
            max-width: 180px;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 1px solid var(--play-border);
        }

        .search-bar-mock {
            max-width: 600px;
            margin: 20px auto;
            background-color: var(--play-card);
            padding: 12px 20px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            color: var(--play-muted);
            font-size: 15px;
            border: 1px solid var(--play-border);
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .store-section-title {
            max-width: 1000px;
            margin: 25px auto 10px auto;
            padding: 0 20px;
            font-size: 20px;
            font-weight: 500;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .store-subtitle {
            font-size: 13px;
            color: var(--play-green);
            font-weight: 700;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .app-card {
            background: none;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .app-card:active {
            transform: scale(0.96);
        }

        .app-icon-container {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: var(--play-card);
            border-radius: 22%;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-icon-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-title {
            font-size: 14px;
            font-weight: 400;
            color: var(--play-text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 2px;
        }

        .app-rating {
            font-size: 12px;
            color: var(--play-muted);
            display: flex;
            align-items: center;
            gap: 3px;
            margin-bottom: 6px;
        }

        .app-rating span {
            color: #ffb300;
        }

        .install-btn {
            background-color: var(--play-green);
            color: #121212;
            border: none;
            padding: 6px 0;
            border-radius: 18px;
            font-size: 12px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            text-align: center;
        }

        #game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 10000;
            flex-direction: column;
        }

        .overlay-header {
            background-color: #1f1f1f;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--play-border);
        }

        .overlay-title {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
        }

        .close-btn {
            background-color: #e32636;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        #game-frame {
            width: 100%;
            flex-grow: 1;
            border: none;
            background-color: #000;
        }

        .music-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--play-card);
            border: 1px solid var(--play-border);
            padding: 10px 18px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 999;
        }

        .music-info {
            font-size: 12px;
            color: var(--play-text);
        }

        .music-ctrl-btn {
            background-color: var(--play-green);
            color: #000;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .apps-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 14px;
                padding: 0 12px;
            }
            .header-banner img {
                height: 65px;
            }
        }
    </style>
</head>
<body>

    <audio id="store-bg-music" loop>
        <source src="muzik.mp3" type="audio/mpeg">
    </audio>

    <header class="header-banner">
        <img src="WhatsApp Image 2026-06-15 at 14.47.55.jpeg" alt="Ana Logo 1">
        <img src="WhatsApp Image 2026-06-15 at 16.15.02.jpeg" alt="Ana Logo 2">
    </header>

    <div class="search-bar-mock">🔍 Oyun ve uygulama arayın...</div>

    <div class="store-section-title">
        <div>Önerilen Oyunlar</div>
        <div class="store-subtitle">MOBİL UYUMLU</div>
    </div>

            </div>

                <div class="app-rating"><span>★</span> 4.8</div>

        </div>

            </div>
            <div class="app-details">
                <div class="app-title">BALL TO HOLD</div>
                <div class="app-rating"><span>★</span> 4.7</div>
                <button class="install-btn">Oyna</button>
            </div>
        </div>

        <div class="app-card" onclick="launchGame('https://editor.p5js.org/frawn_xeltrixgo123/full/lmOp0nLPl', 'Kaçış Oyunu')">
            <div class="app-icon-container">
                <img src="NEON (6).png" alt="Kaçış Oyunu">
            </div>
            <div class="app-details">
                <div class="app-title">Kaçış Oyunu</div>
                <div class="app-rating"><span>★</span> 4.6</div>
                <button class="install-btn">Oyna</button>
            </div>
        </div>

        <div class="app-card" onclick="launchGame('https://editor.p5js.org/frawn_xeltrixgo123/full/vcVT5LXKx', 'Neon Dino')">
            <div class="app-icon-container">
                <img src="NEON (8).png" alt="Neon Dino">
            </div>
            <div class="app-details">
                <div class="app-title">Neon Dino</div>
                <div class="app-rating"><span>★</span> 4.8</div>
                <button class="install-btn">Oyna</button>
            </div>
        </div>

        <div class="app-card" onclick="launchGame('https://editor.p5js.org/frawn_xeltrixgo123/full/Pndgpq8Z4', 'RED BALL')">
            <div class="app-icon-container">
                <img src="flappy forest (1).png" alt="RED BALL">
            </div>
            <div class="app-details">
                <div class="app-title">RED BALL</div>
                <div class="app-rating"><span>★</span> 4.9</div>
                <button class="install-btn">Oyna</button>
            </div>
        </div>

        <div class="app-card" onclick="launchGame('https://editor.p5js.org/frawn_xeltrixgo123/full/N9DH-5wMP', 'Sepeti Yakala')">
            <div class="app-icon-container">
                <img src="flappy forest (2).jpg" alt="Sepeti Yakala">
            </div>
            <div class="app-details">
                <div class="app-title">Sepeti Yakala</div>
                <div class="app-rating"><span>★</span> 4.6</div>
                <button class="install-btn">Oyna</button>
            </div>
        </div>

        <div class="app-card" onclick="launchGame('https://editor.p5js.org/frawn_xeltrixgo123/full/pDgsw-U2s', 'Flappy Forest')">
            <div class="app-icon-container">
                <img src="flappy forest.png" alt="Flappy Forest">
            </div>
            <div class="app-details">
                <div class="app-title">Flappy Forest</div>
                <div class="app-rating"><span>★</span> 4.7</div>
                <button class="install-btn">Oyna</button>
            </div>
        </div>

        <div class="app-card" onclick="launchGame('https://editor.p5js.org/frawn_xeltrixgo123/full/GG6iHi5Ar', 'Tıklama Yarışı')">
            <div class="app-icon-container">
                <img src="flappy forest.png" alt="Tıklama Yarışı">
            </div>
            <div class="app-details">
                <div class="app-title">Tıklama Yarışı</div>
                <div class="app-rating"><span>★</span> 4.5</div>
                <button class="install-btn">Oyna</button>
            </div>
        </div>

        <div class="app-card" onclick="launchGame('https://editor.p5js.org/frawn_xeltrixgo123/full/9vuYB_6U-', 'Uzay Savaşı')">
            <div class="app-icon-container">
                <img src="flappy forest (1).png" alt="Uzay Savaşı">
            </div>
            <div class="app-details">
                <div class="app-title">Uzay Savaşı</div>
                <div class="app-rating"><span>★</span> 4.9</div>
                <button class="install-btn">Oyna</button>
            </div>
        </div>

    </main>

    <div class="music-widget">
        <span class="music-info">🎵 Mağaza Müziği</span>
        <button class="music-ctrl-btn" id="music-btn" onclick="controlMusic()">AÇ</button>
    </div>

    <div id="game-overlay">
        <div class="overlay-header">
            <div class="overlay-title" id="current-game-title">Oyun Yükleniyor...</div>
            <button class="close-btn" onclick="terminateGame()">❌ Mağazaya Dön</button>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        const backgroundAudio = document.getElementById('store-bg-music');
        const musicButton = document.getElementById('music-btn');

        function controlMusic() {
            if (backgroundAudio.paused) {
                backgroundAudio.play().catch(err => console.log("Etkileşim gerekiyor."));
                musicButton.innerText = "KAPAT";
                musicButton.style.backgroundColor = "#e32636";
                musicButton.style.color = "#fff";
            } else {
                backgroundAudio.pause();
                musicButton.innerText = "AÇ";
                musicButton.style.backgroundColor = "var(--play-green)";
                musicButton.style.color = "#000";
            }
        }

        function launchGame(link, title) {
            document.getElementById('current-game-title').innerText = title;
            document.getElementById('game-frame').src = link;
            document.getElementById('game-overlay').style.display = 'flex';
        }

        function terminateGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>

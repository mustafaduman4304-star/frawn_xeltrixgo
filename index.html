<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frawn Play Store</title>
    <style>
        :root { --play-bg: #1f1f1f; --play-green: #00a173; }
        body { background-color: var(--play-bg); color: #e3e3e3; font-family: sans-serif; padding: 20px; text-align: center; }
        .header { font-size: 40px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: #2d2d2d; padding: 15px; border-radius: 20px; transition: 0.2s; }
        .emoji { font-size: 60px; margin: 10px 0; }
        button { background: var(--play-green); border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; width: 100%; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; }
        iframe { width: 100%; height: 90vh; border: none; }
    </style>
</head>
<body>

    <div class="header">🤖 Frawn Store 🚀</div>

    <div class="grid">
        <div class="card"><div class="emoji">🐂</div><h3>Art of Escape</h3><button onclick="openGame('https://editor.p5js.org/frawn_xeltrixgo123/full/h8FC7_B17')">OYNA</button></div>
        <div class="card"><div class="emoji">🏎️</div><h3>Neon Racer</h3><button onclick="openGame('https://editor.p5js.org/frawn_xeltrixgo123/full/iroplnYi4')">OYNA</button></div>
        <div class="card"><div class="emoji">⚽</div><h3>Ball to Hold</h3><button onclick="openGame('https://editor.p5js.org/frawn_xeltrixgo123/full/01I91EN71')">OYNA</button></div>
        <div class="card"><div class="emoji">🐔</div><h3>Kaçış</h3><button onclick="openGame('https://editor.p5js.org/frawn_xeltrixgo123/full/lmOp0nLPl')">OYNA</button></div>
        <div class="card"><div class="emoji">🦖</div><h3>Neon Dino</h3><button onclick="openGame('https://editor.p5js.org/frawn_xeltrixgo123/full/vcVT5LXKx')">OYNA</button></div>
        <div class="card"><div class="emoji">🔴</div><h3>Red Ball</h3><button onclick="openGame('https://editor.p5js.org/frawn_xeltrixgo123/full/Pndgpq8Z4')">OYNA</button></div>
        <div class="card"><div class="emoji">🧺</div><h3>Sepeti Yakala</h3><button onclick="openGame('https://editor.p5js.org/frawn_xeltrixgo123/full/N9DH-5wMP')">OYNA</button></div>
        <div class="card"><div class="emoji">🐦</div><h3>Flappy Forest</h3><button onclick="openGame('https://editor.p5js.org/frawn_xeltrixgo123/full/pDgsw-U2s')">OYNA</button></div>
        <div class="card"><div class="emoji">👆</div><h3>Tıklama</h3><button onclick="openGame('https://editor.p5js.org/frawn_xeltrixgo123/full/GG6iHi5Ar')">OYNA</button></div>
        <div class="card"><div class="emoji">🛸</div><h3>Uzay</h3><button onclick="openGame('https://editor.p5js.org/frawn_xeltrixgo123/full/9vuYB_6U-')">OYNA</button></div>
    </div>

    <div id="modal">
        <button onclick="closeGame()" style="background:#e32636; width:100px; margin:10px;">KAPAT</button>
        <iframe id="frame"></iframe>
    </div>

    <script>
        function openGame(l) { document.getElementById('frame').src = l; document.getElementById('modal').style.display = 'block'; }
        function closeGame() { document.getElementById('modal').style.display = 'none'; document.getElementById('frame').src = ''; }
    </script>
</body>
</html>
